version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fashion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fashion_user
      POSTGRES_PASSWORD: fashion_password
      POSTGRES_DB: fashion_trend_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashion_user -d fashion_trend_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fashion_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: fashion_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: fashion_raw_data

  # ── FastAPI App ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fashion_user:fashion_password@postgres:5432/fashion_trend_db
      DATABASE_URL_SYNC: postgresql://fashion_user:fashion_password@postgres:5432/fashion_trend_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fashion_user:fashion_password@postgres:5432/fashion_trend_db
      DATABASE_URL_SYNC: postgresql://fashion_user:fashion_password@postgres:5432/fashion_trend_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      - redis
      - postgres
    volumes:
      - ./:/app
    command: celery -A app.workers.scheduler.celery_app worker --loglevel=info --concurrency=4

  # ── Celery Beat (Scheduler) ────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fashion_user:fashion_password@postgres:5432/fashion_trend_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    volumes:
      - ./:/app
    command: celery -A app.workers.scheduler.celery_app beat --loglevel=info

  # ── Flower (Celery Monitoring) ─────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    command: celery -A app.workers.scheduler.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
  mongo_data:
